<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>健身数据管理系统 HTML_V3.0</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #4a6fa5;
            --secondary: #6b8cbc;
            --accent: #ff7e5f;
            --light: #f8f9fa;
            --dark: #343a40;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --border-radius: 12px;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body { background-color: #f5f7fa; color: var(--dark); line-height: 1.5; font-size: 15px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 1200px; margin: 0 auto; padding: 12px; }
        .card { background: white; border-radius: var(--border-radius); box-shadow: var(--shadow); padding: 18px; margin-bottom: 16px; }
        h1, h2 { color: var(--primary); margin-bottom: 16px; text-align: center; }
        h1 { font-size: 1.8rem; position: relative; display: inline-block; width: 100%; }
        h1:after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 60px; height: 3px; background: linear-gradient(to right, var(--primary), var(--accent)); border-radius: 3px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: var(--border-radius); font-size: 15px; background: white; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.15); }
        .btn { padding: 10px 18px; border: none; border-radius: var(--border-radius); cursor: pointer; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; background-color: var(--light); color: var(--dark); }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover, .btn-primary:active { background-color: var(--secondary); transform: scale(0.98); }
        .btn-accent { background-color: var(--accent); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-warning { background-color: var(--warning); color: var(--dark); }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:active { background: var(--primary); color: white; }
        .btn-icon { width: 44px; height: 44px; padding: 0; border-radius: 50%; font-size: 20px; }
        .page { display: none; }
        .page.active { display: block; }

        /* 录入页样式 */
        .project-controls { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 12px; }
        .project-item { border: 1px solid #eaeaea; border-radius: var(--border-radius); padding: 16px; margin-bottom: 16px; background: var(--light); }
        .project-item-header { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .sub-items { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .work-display { background: #e8f5e8; padding: 10px; border-radius: var(--border-radius); text-align: center; margin-top: 10px; font-weight: bold; color: #2e7d32; font-size: 14px; }
        .optional { color: #6c757d; font-weight: normal; }
        .time-display { font-size: 1rem; padding: 12px; background-color: #e9f7fe; border-radius: var(--border-radius); text-align: center; margin-bottom: 16px; }
        .time-value { font-weight: bold; color: var(--accent); }
        .ai-global-section { margin-top: 20px; padding: 16px; background: #f0f8ff; border-radius: var(--border-radius); border-left: 4px solid var(--primary); }
        .ai-suggestion-display { background: #fff; padding: 16px; border-radius: var(--border-radius); margin-top: 12px; min-height: 120px; white-space: pre-wrap; border: 1px solid #e0e0e0; max-height: 400px; overflow-y: auto; font-size: 14px; }

        /* 历史页 - 移动优先：上下布局 */
        .history-stack { display: flex; flex-direction: column; gap: 16px; }
        .history-table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 500px; }
        .history-table th, .history-table td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #eee; }
        .history-table th { background: var(--primary); color: white; font-weight: 600; }
        .history-table tr.selected { background: #d4edda; }
        .batch-toolbar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
        .checkbox-col { width: 36px; text-align: center; }
        .empty-state { text-align: center; padding: 40px 20px; color: #6c757d; font-size: 14px; }

        .nav-buttons { display: flex; justify-content: center; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        
        /* 陪练卡片 - 移动端独立显示 */
        .coach-card { text-align: center; }
        .coach-image-container { width: 140px; height: 140px; margin: 0 auto 12px; border-radius: 20px; background: var(--light); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .coach-image { font-size: 70px; line-height: 1; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .coach-image img { width: 100%; height: 100%; object-fit: contain; }
        .coach-hint { font-size: 12px; color: #666; margin-top: 6px; }
        .response-wrapper { position: relative; margin-top: 16px; }
        .coach-response { background: var(--light); border-radius: 12px; padding: 16px; height: auto; max-height: 400px; overflow-y: auto; white-space: pre-wrap; text-align: left; border-left: 4px solid var(--primary); font-size: 14px; line-height: 1.5; }
        .scroll-indicator {
            position: sticky;
            bottom: 12px;
            right: 12px;
            float: right;
            background: rgba(74, 111, 165, 0.9);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            margin-top: -40px;
            margin-right: 8px;
        }
        .scroll-indicator:active { transform: scale(0.95); }
        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(4px); }
        }
        .scroll-indicator.bounce { animation: gentleBounce 1s ease-in-out infinite; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 16px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: var(--border-radius); width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; padding: 20px; position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; position: sticky; top: 0; background: white; padding-bottom: 8px; }
        .modal-title { font-size: 1.3rem; color: var(--primary); }
        .close-modal { background: none; border: none; font-size: 24px; cursor: pointer; padding: 0 8px; }
        .preset-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 15px 0; }
        .preset-item { padding: 10px; border: 2px solid #ddd; border-radius: 12px; cursor: pointer; text-align: center; }
        .preset-item.selected { border-color: var(--primary); background: #e0ebff; }
        .preset-emoji { font-size: 32px; }
        .preset-item img { width: 45px; height: 45px; object-fit: contain; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.1); border-radius: 50%; border-top-color: var(--primary); animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }

        /* 平板及以上设备：恢复左右布局 */
        @media (min-width: 768px) {
            .container { padding: 20px; }
            .card { padding: 24px; }
            .history-stack { flex-direction: row; gap: 24px; align-items: flex-start; }
            .history-left { flex: 2; min-width: 0; }
            .history-right { flex: 1; min-width: 280px; position: sticky; top: 20px; }
            .coach-image-container { width: 100%; height: 200px; }
            .coach-image { font-size: 80px; }
            .history-table { font-size: 14px; min-width: auto; }
        }

        /* 小屏幕优化 */
        @media (max-width: 480px) {
            .btn { padding: 8px 14px; font-size: 13px; }
            .project-item-header { grid-template-columns: 1fr; gap: 10px; }
            .sub-items { grid-template-columns: 1fr; }
            .nav-buttons button { flex: 1; min-width: 120px; }
            .batch-toolbar { justify-content: space-between; }
            .batch-toolbar .btn { padding: 6px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 录入页面 -->
    <div id="input-page" class="page active">
        <h1>🏋️ 健身数据管理系统 HTML_V3.0</h1>
        <div class="card" style="background-color: #f0f4f8; border-left: 4px solid var(--primary);">
            <h3>⚙️ 设置第一次健身时间</h3>
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                <div class="form-group" style="flex:1; min-width: 140px;"><label>日期</label><input type="date" id="first-date"></div>
                <div class="form-group" style="flex:1; min-width: 120px;"><label>时间</label><input type="time" id="first-time" step="1"></div>
            </div>
            <button id="save-first-workout" class="btn btn-primary">保存设置</button>
        </div>
        <div class="card">
            <div class="form-group"><label>📅 日期</label><input type="date" id="workout-date" required></div>
            <div class="form-group">
                <div class="project-controls">
                    <button id="add-project" class="btn btn-primary btn-icon">+</button>
                    <button id="remove-project" class="btn btn-accent btn-icon">-</button>
                </div>
                <div id="projects-container">
                    <div class="project-item">
                        <div class="project-item-header">
                            <div class="form-group"><label>项目名称</label><input type="text" class="project-name" placeholder="例如：坐姿推肩"></div>
                            <div class="form-group"><label>锻炼部位</label><select class="project-part"><option>胸</option><option>背</option><option>腿</option><option>肩</option><option>腹</option></select></div>
                        </div>
                        <div class="sub-items">
                            <div class="form-group"><label>重量 (kg)</label><input type="number" class="weight" min="0" step="0.5"></div>
                            <div class="form-group"><label>组数</label><input type="number" class="sets" min="1"></div>
                            <div class="form-group"><label>每组数量</label><input type="number" class="reps" min="1"></div>
                            <div class="form-group"><label>感受</label><select class="feeling"><option>轻松</option><option selected>适中</option><option>吃力</option><option>非常吃力</option></select></div>
                            <div class="form-group"><label>做功 (J)</label><input type="number" class="work" readonly><div class="work-display">做功: <span class="work-value">0</span> J</div></div>
                            <div class="form-group"><label>补剂</label><input type="text" class="supplement" placeholder="例如：蛋白粉"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="form-group"><label>#️⃣ 第几次健身</label><input type="number" id="workout-count" min="1" required></div>
            <div class="ai-global-section">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;"><h3 style="margin:0; font-size:1.1rem;">🤖 AI 训练汇总分析</h3><button id="global-ai-btn" class="btn btn-primary">✨ 生成智能报告</button></div>
                <div id="global-ai-display" class="ai-suggestion-display">点击上方按钮，AI将综合分析本次所有项目。</div>
            </div>
            <div class="form-group"><h2 style="font-size:1.2rem;">⏰ 距离第一次决定健身已过时间</h2><div class="time-display">已坚持: <span id="time-passed" class="time-value">计算中...</span></div></div>
            <div class="nav-buttons">
                <button id="save-btn" class="btn btn-success">💾 保存记录</button>
                <button id="view-history" class="btn btn-outline">📜 来时的路·AI陪练</button>
            </div>
        </div>
    </div>

    <!-- 历史记录页面 - 移动端上下布局，平板左右布局 -->
    <div id="history-page" class="page">
        <h1>📜 来时的路 · AI 陪练</h1>
        <div class="history-stack">
            <!-- 左侧历史表格 -->
            <div class="history-left">
                <div class="card">
                    <div id="batch-toolbar" class="batch-toolbar" style="display: none;">
                        <span id="selected-count" style="margin-right: auto;">已选择 0 条</span>
                        <button id="batch-delete" class="btn btn-danger">批量删除</button>
                        <button id="batch-edit-supplement" class="btn btn-primary">批量修改补剂</button>
                        <button id="cancel-batch" class="btn btn-outline">取消选择</button>
                    </div>
                    <div class="history-table-wrapper">
                        <table class="history-table" id="history-table" style="display: none;">
                            <thead><tr><th class="checkbox-col"><input type="checkbox" id="select-all-checkbox"></th><th>日期</th><th>项目</th><th>第几次</th><th>坚持时间</th><th>操作</th></tr></thead>
                            <tbody id="history-body"></tbody>
                        </table>
                    </div>
                    <div id="empty-history" class="empty-state"><i>📊</i><h3>暂无健身记录</h3><p>开始记录你的第一次健身数据吧！</p></div>
                </div>
                <div class="nav-buttons" style="margin-top: 12px;">
                    <button id="export-btn" class="btn btn-success">📎 导出Excel</button>
                    <button id="import-btn" class="btn btn-outline">📂 读入Excel</button>
                    <button id="back-to-input" class="btn btn-outline">✏️ 返回记录</button>
                </div>
            </div>

            <!-- 右侧AI陪练（移动端在下方） -->
            <div class="history-right">
                <div class="card coach-card">
                    <h3 style="margin-bottom: 10px;">🤖 AI 陪练</h3>
                    <div id="coach-image-container" class="coach-image-container" title="左键分析 · 右键菜单">
                        <div id="coach-display" class="coach-image">🦁</div>
                    </div>
                    <div class="coach-hint">👆 单击分析全部记录<br>👇 右键/长按 更换形象</div>
                    <div class="response-wrapper">
                        <div id="coach-response" class="coach-response" style="display: none;"></div>
                        <div id="scroll-indicator" class="scroll-indicator bounce">↓</div>
                    </div>
                    <div id="coach-loading" style="display: none; margin-top: 12px;"><span class="loading-spinner"></span> AI 正在分析历史数据...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 编辑模态框 -->
<div id="edit-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3 class="modal-title">✏️ 编辑记录</h3><button class="close-modal">&times;</button></div>
        <form id="edit-form">
            <div class="form-group"><label>日期</label><input type="date" id="edit-date" required></div>
            <div id="edit-projects-container"></div>
            <div class="form-group"><label>第几次健身</label><input type="number" id="edit-count" min="1" required></div>
            <div class="modal-actions" style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;"><button type="button" id="delete-record" class="btn btn-danger">删除</button><button type="submit" class="btn btn-success">保存</button></div>
        </form>
    </div>
</div>

<!-- 批量补剂模态框 -->
<div id="batch-supplement-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>批量修改补剂</h3><button class="close-modal" id="close-batch-supplement">&times;</button></div>
        <div class="form-group"><label>补剂内容</label><input type="text" id="batch-supplement-value" placeholder="蛋白粉、肌酸"></div>
        <div class="modal-actions" style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;"><button id="confirm-batch-supplement" class="btn btn-success">确认</button><button id="cancel-batch-supplement" class="btn btn-outline">取消</button></div>
    </div>
</div>

<!-- 切换形象菜单 -->
<div id="coach-menu" class="modal" style="background: transparent;">
    <div class="modal-content" style="max-width: 340px; padding: 20px;">
        <h3 style="margin-bottom: 16px;">🎨 选择陪练形象</h3>
        <div id="preset-images-grid" class="preset-list"></div>
        <button id="upload-custom-image" class="btn btn-outline" style="width: 100%; margin-top: 12px;">📁 上传自定义图片</button>
        <input type="file" id="custom-image-input" accept="image/*" style="display: none;">
        <button id="close-coach-menu" class="btn btn-primary" style="width: 100%; margin-top: 12px;">关闭</button>
    </div>
</div>

<input type="file" id="file-input" accept=".xlsx,.xls" style="display: none;">

<script>
    (function(){
        "use strict";
        const DEFAULT_FIRST_WORKOUT = '2025-06-09T18:29:00';
        const WORKOUT_DISTANCES = { '胸':0.6, '背':0.6, '腿':0.7, '肩':0.6 };
        const ABDOMINAL_WORK_PER_REP = 65 * 9.8 * 0.3;

        // 语料库（保持原样，精简版）

            encouragements: ["✨ 每一次力竭都是成长的信号，继续加油！", "🌟 肌肉在休息时生长，好好睡觉和补充蛋白质。", "💫 你已经走在正确的路上了，剩下的交给时间。", "🏔️ 阿诺德说：'最后一组才是真正的开始'。"],

            weekSummary: ["📆 本周共训练${weekSessions}次，总做功${weekWorkKJ}千焦。", "📊 周报：训练${weekSessions}次，总做功${weekWorkKJ}千焦。"],
            historySummary: ["🏆 自首次健身以来，累计训练${totalSessions}次，总组数${totalSets}组，总做功${totalWorkKJ}千焦。", "📜 从开始到现在，你一共完成了${totalSessions}次训练，${totalSets}组动作，输出${totalWorkKJ}千焦。"],
            weekPartAdvice: ["本周训练部位：${weekParts}。${missingPartsMsg}", "周部位覆盖：${weekParts}。${missingPartsMsg}"]
        };
        function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function getFrequencyComment(sessions) {
            if (sessions >= 4) return "非常勤奋！注意休息。";
            if (sessions >= 3) return "频率很棒！";
            if (sessions >= 2) return "保持住，继续加油。";
            if (sessions >= 1) return "还可以再努力一次。";
            return "建议增加训练频率。";
        }

        // 存储操作
        function getRecords() { return JSON.parse(localStorage.getItem('fitnessRecords')||'[]'); }
        function saveRecords(r) { localStorage.setItem('fitnessRecords', JSON.stringify(r)); }
        function getUserFirst() { let s=localStorage.getItem('firstWorkoutDateTime'); return s?new Date(s):new Date(DEFAULT_FIRST_WORKOUT); }
        function setUserFirst(d) { localStorage.setItem('firstWorkoutDateTime', d); }
        function getTimePassed(date) {
            let diff = new Date(date) - getUserFirst();
            if(diff<0) return '尚未开始';
            let d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000), m=Math.floor((diff%3600000)/60000);
            return `${d}天 ${h}小时 ${m}分钟`;
        }
        function updateTimePassedDisplay() {
            const now = new Date(), first = getUserFirst(), diff = now - first;
            const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000);
            document.getElementById('time-passed').textContent = `${d}天 ${h}小时 ${m}分钟`;
        }

        function calculateWork(part, weight, sets, reps) {
            if (part === '腹') return Math.round(sets * reps * ABDOMINAL_WORK_PER_REP);
            return Math.round(weight * 9.8 * (WORKOUT_DISTANCES[part] || 0.6) * sets * reps);
        }
        function updateWorkDisplay(div) {
            const part = div.querySelector('.project-part').value;
            const w = parseFloat(div.querySelector('.weight').value) || 0;
            const s = parseInt(div.querySelector('.sets').value) || 0;
            const r = parseInt(div.querySelector('.reps').value) || 0;
            const work = calculateWork(part, w, s, r);
            div.querySelector('.work').value = work;
            div.querySelector('.work-value').textContent = work;
        }
        function addProjectListeners(div) {
            div.querySelectorAll('.project-part, .weight, .sets, .reps').forEach(i => i.addEventListener('input', () => updateWorkDisplay(div)));
            updateWorkDisplay(div);

        function getCurrentProjectsData() {
            const projs = [];
            document.querySelectorAll('#projects-container .project-item').forEach(div => {
                const name = div.querySelector('.project-name').value.trim();
                if (!name) return;
                projs.push({
                    name, part: div.querySelector('.project-part').value,
                    weight: parseFloat(div.querySelector('.weight').value) || 0,
                    sets: parseInt(div.querySelector('.sets').value) || 0,
                    reps: parseInt(div.querySelector('.reps').value) || 0,
                    feeling: div.querySelector('.feeling').value,
                    work: parseInt(div.querySelector('.work').value) || 0,
                    supplement: div.querySelector('.supplement').value || ''
                });
            });
            return projs;
        }

        function getPreviousWeight(records, name, part, currentDate) {
            const history = [];
            records.forEach(rec => {
                if (new Date(rec.date) >= new Date(currentDate)) return;
                rec.projects.forEach(p => { if (p.name === name && p.part === part) history.push({ date: rec.date, weight: p.weight }); });
            });
            history.sort((a,b)=>new Date(b.date)-new Date(a.date));
            return history.length ? history[0].weight : null;
        }

        function predictWeight(records, name, part) {
            const data = [];
            records.forEach(rec => {
                rec.projects.forEach(p => { if (p.name === name && p.part === part) data.push({ date: rec.date, weight: p.weight }); });
            });
            data.sort((a,b)=>new Date(a.date)-new Date(b.date));
            if (data.length < 3) return null;
            const recent = data.slice(-5);
            const n = recent.length;
            let sumX=0, sumY=0, sumXY=0, sumX2=0;
            for (let i=0;i<n;i++) {
                const x=i, y=recent[i].weight;
                sumX+=x; sumY+=y; sumXY+=x*y; sumX2+=x*x;
            }
            const slope = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);
            const intercept = (sumY - slope*sumX)/n;
            return intercept + slope*n;
        }

        function generateGlobalReport(currentProjects, allRecords, currentDate) {
            if (!currentProjects.length) return '⚠️ 请先填写至少一个训练项目。';
            let report = rnd(COACH_RULES.openings) + '\n\n';
            const totalWork = currentProjects.reduce((s,p)=>s+(p.work||0),0);
            const workKJ = (totalWork/1000).toFixed(0);
            let level = totalWork>50000 ? 'highVolume' : (totalWork>20000 ? 'moderate' : 'lowVolume');
            report += rnd(COACH_RULES.overall[level]).replace('${work}', workKJ) + '\n\n';
            const parts = [...new Set(currentProjects.map(p=>p.part))];
            const missing = ['胸','背','腿','肩','腹'].filter(p=>!parts.includes(p));
            if (missing.length===0) report += rnd(COACH_RULES.partBalance.good).replace('${parts}', parts.join('、')) + '\n';
            else report += rnd(COACH_RULES.partBalance.missing).replace('${parts}', missing.join('、')) + '\n';
            const thisWeek = allRecords.filter(r=>{
                const d = new Date(r.date), now = new Date();
                const start = new Date(now.setDate(now.getDate()-now.getDay()+1));
                return d>=start;
            }).length;
            report += `本周你已经训练了${thisWeek}次，${getFrequencyComment(thisWeek)}\n\n`;
            report += '📋 项目详细点评：\n';
            for (let p of currentProjects) {
                const prev = getPreviousWeight(allRecords, p.name, p.part, currentDate);
                let line = `  • ${p.name} (${p.part})：${p.sets}组×${p.reps}次 @${p.weight}kg，做功${p.work}J。`;
                if (prev !== null) {
                    const diff = (p.weight - prev).toFixed(1);
                    if (diff>0) line += ' ' + rnd(COACH_RULES.perExercise.improved).replace('${name}',p.name).replace('${diff}',diff);
                    else if (diff<0) line += ' ' + rnd(COACH_RULES.perExercise.declined).replace('${name}',p.name).replace('${diff}',Math.abs(diff));
                    else line += ' ' + rnd(COACH_RULES.perExercise.same).replace('${name}',p.name);
                } else line += ' ' + rnd(COACH_RULES.perExercise.first).replace('${name}',p.name);
                report += line + '\n';
                const pred = predictWeight(allRecords, p.name, p.part);
                if (pred && pred > p.weight) {
                    const weeks = Math.max(2, Math.ceil((pred-p.weight)/1.2));
                    const target = (p.weight + (pred-p.weight)/2).toFixed(1);
                    report += '    ' + rnd(COACH_RULES.predictions).replace('${name}',p.name).replace('${weeks}',weeks).replace('${target}',target) + '\n';
                }
            }
            report += '\n✨ ' + rnd(COACH_RULES.encouragements) + '\n';
            report += rnd(COACH_RULES.tips);
            return report;
        }

        function generateHistoryReport(records) {
            if (!records.length) return '暂无历史记录，快去录入第一次训练吧！';
            const latest = records[0];
            const today = new Date();
            const dayOfWeek = today.getDay();
            const monday = new Date(today);
            monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
            monday.setHours(0,0,0,0);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            sunday.setHours(23,59,59,999);
            const weekRecords = records.filter(r => { const d = new Date(r.date); return d >= monday && d <= sunday; });
            let totalWork = 0, totalSets = 0, totalSessions = records.length;
            records.forEach(r => { r.projects.forEach(p => { totalWork += p.work || 0; totalSets += p.sets || 0; }); });
            const totalWorkKJ = (totalWork / 1000).toFixed(0);
            let report = rnd(COACH_RULES.openings) + '\n\n';
            // 最近一次
            report += `📅 最近一次训练 (${latest.date}) 分析：\n`;
            const latestWork = latest.projects.reduce((s,p)=>s+(p.work||0),0);
            const latestKJ = (latestWork/1000).toFixed(0);
            let level = latestWork>50000 ? 'highVolume' : (latestWork>20000 ? 'moderate' : 'lowVolume');
            report += rnd(COACH_RULES.overall[level]).replace('${work}', latestKJ) + '\n';
            const latestParts = [...new Set(latest.projects.map(p=>p.part))];
            const missing = ['胸','背','腿','肩','腹'].filter(p=>!latestParts.includes(p));
            if (missing.length===0) report += rnd(COACH_RULES.partBalance.good).replace('${parts}', latestParts.join('、')) + '\n';
            else report += rnd(COACH_RULES.partBalance.missing).replace('${parts}', missing.join('、')) + '\n';
            report += '📋 项目详情：\n';
            for (let p of latest.projects) {
                const prev = getPreviousWeight(records.slice(1), p.name, p.part, latest.date);
                let line = `  • ${p.name} (${p.part})：${p.sets}组×${p.reps}次 @${p.weight}kg，做功${p.work}J。`;
                if (prev !== null) {
                    const diff = (p.weight - prev).toFixed(1);
                    if (diff>0) line += ' ' + rnd(COACH_RULES.perExercise.improved).replace('${name}',p.name).replace('${diff}',diff);
                    else if (diff<0) line += ' ' + rnd(COACH_RULES.perExercise.declined).replace('${name}',p.name).replace('${diff}',Math.abs(diff));
                    else line += ' ' + rnd(COACH_RULES.perExercise.same).replace('${name}',p.name);
                } else line += ' ' + rnd(COACH_RULES.perExercise.first).replace('${name}',p.name);
                report += line + '\n';
                const pred = predictWeight(records, p.name, p.part);
                if (pred && pred > p.weight) {
                    const weeks = Math.max(2, Math.ceil((pred-p.weight)/1.2));
                    const target = (p.weight + (pred-p.weight)/2).toFixed(1);
                    report += '    ' + rnd(COACH_RULES.predictions).replace('${name}',p.name).replace('${weeks}',weeks).replace('${target}',target) + '\n';
                }
            }
            report += '\n';
            // 本周
            const weekSessions = weekRecords.length;
            let weekWork = 0;
            weekRecords.forEach(r => { r.projects.forEach(p => { weekWork += p.work||0; }); });
            const weekWorkKJ = (weekWork/1000).toFixed(0);
            report += `📆 本周训练总结 (${monday.toLocaleDateString()} ~ ${sunday.toLocaleDateString()})：\n`;
            report += rnd(COACH_RULES.weekSummary).replace('${weekSessions}', weekSessions).replace('${weekWorkKJ}', weekWorkKJ) + '\n';
            report += `本周你已经训练了${weekSessions}次，${getFrequencyComment(weekSessions)}\n`;
            const weekPartsSet = new Set();
            weekRecords.forEach(r => { r.projects.forEach(p => { weekPartsSet.add(p.part); }); });
            const weekParts = [...weekPartsSet];
            const weekMissing = ['胸','背','腿','肩','腹'].filter(p=>!weekParts.includes(p));
            let missingMsg = weekMissing.length ? `缺少${weekMissing.join('、')}训练，下周注意平衡。` : '所有主要部位都已覆盖，非常好！';
            report += rnd(COACH_RULES.weekPartAdvice).replace('${weekParts}', weekParts.join('、') || '无').replace('${missingPartsMsg}', missingMsg) + '\n';
            if (weekWork > 0) {
                let weekLevel = weekWork>150000 ? 'highVolume' : (weekWork>60000 ? 'moderate' : 'lowVolume');
                report += rnd(COACH_RULES.overall[weekLevel]).replace('${work}', weekWorkKJ) + '\n';
            } else { report += '⚠️ 本周还没有训练记录，抓紧时间动起来！\n'; }
            report += '\n';
            // 整体
            report += `🏆 健身以来整体回顾 (共 ${totalSessions} 次训练)：\n`;
            report += rnd(COACH_RULES.historySummary).replace('${totalSessions}', totalSessions).replace('${totalSets}', totalSets).replace('${totalWorkKJ}', totalWorkKJ) + '\n';
            const allPartsMap = {};
            records.forEach(r => { r.projects.forEach(p => { allPartsMap[p.part] = (allPartsMap[p.part]||0) + 1; }); });
            const favPart = Object.keys(allPartsMap).reduce((a,b)=> allPartsMap[a]>allPartsMap[b] ? a : b, '胸');
            report += `💪 你最常训练的部位是「${favPart}」，${favPart==='腿'?'勇者！':'继续加强其他部位。'}\n`;
            if (records.length >= 2) {
                const firstWork = records[records.length-1].projects.reduce((s,p)=>s+(p.work||0),0);
                const firstKJ = (firstWork/1000).toFixed(0);
                const latestKJTotal = (latestWork/1000).toFixed(0);
                if (latestWork > firstWork) report += `📈 相比第一次训练 (${firstKJ}千焦)，最近一次容量提升了 ${latestKJTotal - firstKJ}千焦，进步显著！\n`;
                else if (latestWork < firstWork) report += `📉 相比第一次训练 (${firstKJ}千焦)，最近一次容量有所下降，可能是减载或状态波动。\n`;
                else report += `⚖️ 相比第一次训练，容量保持稳定，可以尝试突破。\n`;
            }
            if (totalSessions % 10 === 0 && totalSessions>0) report += `🎉 恭喜完成第 ${totalSessions} 次训练！这是一个重要的里程碑！\n`;
            else if (totalSessions === 1) report += `🌟 这是你的第一次记录，坚持下去！\n`;
            report += '\n✨ ' + rnd(COACH_RULES.encouragements) + '\n';
            report += rnd(COACH_RULES.tips);
            return report;
        }

                await new Promise(r=>setTimeout(r, speed));

            let batchToolbar = document.getElementById('batch-toolbar');
            if (!records.length) { emptyDiv.style.display = 'block'; table.style.display = 'none'; batchToolbar.style.display = 'none'; return; }
            emptyDiv.style.display = 'none'; table.style.display = 'table'; tbody.innerHTML = '';
            records.sort((a,b)=>new Date(b.date)-new Date(a.date));
            records.forEach((rec, idx) => {
                let tr = tbody.insertRow();
                let chkCell = tr.insertCell(0);
                let chk = document.createElement('input'); chk.type='checkbox';
                chk.checked = selectedIndices.has(idx);
                chk.addEventListener('change', e => { e.target.checked ? selectedIndices.add(idx) : selectedIndices.delete(idx); updateBatchUI(); tr.classList.toggle('selected', e.target.checked); });
                chkCell.appendChild(chk);
                tr.insertCell(1).textContent = rec.date;
                tr.insertCell(2).innerHTML = rec.projects.map(p => `${p.name} (${p.part}): ${p.sets}组×${p.reps}个, ${p.weight}kg`).join('<br>');
                tr.insertCell(3).textContent = `第${rec.count}次`;
                tr.insertCell(4).textContent = rec.timePassed;
                let actCell = tr.insertCell(5);
                let editBtn = document.createElement('button'); editBtn.textContent='编辑'; editBtn.className='btn btn-warning'; editBtn.style.padding = '4px 12px'; editBtn.style.fontSize = '12px';
                editBtn.onclick = () => openEditModal(idx);
                actCell.appendChild(editBtn);
                if (selectedIndices.has(idx)) tr.classList.add('selected');
            });
            updateBatchUI();
        }
        function updateBatchUI() { let cnt = selectedIndices.size; document.getElementById('selected-count').textContent = `已选择 ${cnt} 条`; let toolbar = document.getElementById('batch-toolbar'); toolbar.style.display = cnt ? 'flex' : 'none'; let total = getRecords().length; let selectAll = document.getElementById('select-all-checkbox'); selectAll.checked = cnt === total && total > 0; selectAll.indeterminate = cnt > 0 && cnt < total; }
        function openEditModal(index) { let records = getRecords(); let rec = records[index]; if (!rec) return; currentEditIndex = index; document.getElementById('edit-date').value = rec.date; document.getElementById('edit-count').value = rec.count; let container = document.getElementById('edit-projects-container'); container.innerHTML = ''; rec.projects.forEach(proj => { let div = document.createElement('div'); div.className='project-item'; div.innerHTML = `<div class="project-item-header"><div class="form-group"><label>项目名称</label><input type="text" class="project-name" value="${escapeHtml(proj.name)}"></div><div class="form-group"><label>锻炼部位</label><select class="project-part">${['胸','背','腿','肩','腹'].map(p=>`<option ${p===proj.part?'selected':''}>${p}</option>`).join('')}</select></div></div><div class="sub-items"><div class="form-group"><label>重量 (kg)</label><input type="number" class="weight" value="${proj.weight}"></div><div class="form-group"><label>组数</label><input type="number" class="sets" value="${proj.sets}"></div><div class="form-group"><label>每组数量</label><input type="number" class="reps" value="${proj.reps}"></div><div class="form-group"><label>感受</label><select class="feeling">${['轻松','适中','吃力','非常吃力'].map(f=>`<option ${f===proj.feeling?'selected':''}>${f}</option>`).join('')}</select></div><div class="form-group"><label>做功 (J)</label><input type="number" class="work" value="${proj.work}" readonly><div class="work-display">做功: <span class="work-value">${proj.work}</span> J</div></div><div class="form-group"><label>补剂</label><input type="text" class="supplement" value="${escapeHtml(proj.supplement||'')}"></div></div></div>`; container.appendChild(div); addProjectListeners(div); }); document.getElementById('edit-modal').classList.add('active'); }
        function escapeHtml(s) { return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        document.getElementById('edit-form').addEventListener('submit', e => { e.preventDefault(); let records = getRecords(); let rec = records[currentEditIndex]; if (!rec) return; rec.date = document.getElementById('edit-date').value; rec.count = parseInt(document.getElementById('edit-count').value); let newProjects = []; document.querySelectorAll('#edit-projects-container .project-item').forEach(item => { let name = item.querySelector('.project-name').value.trim(); if (!name) return; newProjects.push({ name, part: item.querySelector('.project-part').value, weight: parseFloat(item.querySelector('.weight').value) || 0, sets: parseInt(item.querySelector('.sets').value) || 0, reps: parseInt(item.querySelector('.reps').value) || 0, feeling: item.querySelector('.feeling').value, work: parseInt(item.querySelector('.work').value) || 0, supplement: item.querySelector('.supplement').value || '' }); }); rec.projects = newProjects; rec.timePassed = getTimePassed(rec.date); saveRecords(records); document.getElementById('edit-modal').classList.remove('active'); renderHistory(); alert('记录已更新'); });
        document.getElementById('delete-record').addEventListener('click', () => { if (confirm('永久删除此记录？')) { let records = getRecords(); records.splice(currentEditIndex, 1); saveRecords(records); document.getElementById('edit-modal').classList.remove('active'); renderHistory(); alert('已删除'); } });
        document.querySelectorAll('.close-modal').forEach(btn => btn.addEventListener('click', () => { document.getElementById('edit-modal').classList.remove('active'); document.getElementById('batch-supplement-modal').classList.remove('active'); document.getElementById('coach-menu').classList.remove('active'); }));
        document.getElementById('edit-modal').addEventListener('click', e => { if (e.target === document.getElementById('edit-modal')) document.getElementById('edit-modal').classList.remove('active'); });
        document.getElementById('select-all-checkbox').addEventListener('change', e => { let recs = getRecords(); selectedIndices.clear(); if (e.target.checked) recs.forEach((_,i)=>selectedIndices.add(i)); renderHistory(); });
        document.getElementById('batch-delete').addEventListener('click', () => { if (!selectedIndices.size) return alert('请先选择记录'); if (!confirm(`确定删除 ${selectedIndices.size} 条记录吗？`)) return; let records = getRecords().filter((_,i)=>!selectedIndices.has(i)); saveRecords(records); selectedIndices.clear(); renderHistory(); alert('删除成功'); });
        document.getElementById('batch-edit-supplement').addEventListener('click', () => { if (!selectedIndices.size) return alert('请先选择记录'); document.getElementById('batch-supplement-value').value = ''; document.getElementById('batch-supplement-modal').classList.add('active'); });
        document.getElementById('confirm-batch-supplement').addEventListener('click', () => { let val = document.getElementById('batch-supplement-value').value.trim(); if (!val) return alert('请输入补剂内容'); let records = getRecords(); selectedIndices.forEach(i => { if (records[i]) records[i].projects.forEach(p => p.supplement = val); }); saveRecords(records); document.getElementById('batch-supplement-modal').classList.remove('active'); renderHistory(); alert('补剂已批量更新'); });
        document.getElementById('cancel-batch-supplement').addEventListener('click', () => document.getElementById('batch-supplement-modal').classList.remove('active'));
        document.getElementById('close-batch-supplement').addEventListener('click', () => document.getElementById('batch-supplement-modal').classList.remove('active'));
        document.getElementById('cancel-batch').addEventListener('click', () => { selectedIndices.clear(); renderHistory(); });
        exportBtn.addEventListener('click', () => { let records = getRecords(); if (!records.length) return alert('无数据可导出'); let data = [['日期','项目名称','锻炼部位','重量(kg)','组数','每组数量','感受','做功(J)','补剂','第几次健身','距离第一次健身时间']]; records.forEach(r => r.projects.forEach(p => data.push([r.date, p.name, p.part, p.weight, p.sets, p.reps, p.feeling, p.work, p.supplement||'', r.count, r.timePassed]))); let wb = XLSX.utils.book_new(); let ws = XLSX.utils.aoa_to_sheet(data); XLSX.utils.book_append_sheet(wb, ws, '健身记录'); XLSX.writeFile(wb, `健身记录_${new Date().toISOString().slice(0,19)}.xlsx`); });
        importBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => { let file = e.target.files[0]; if (!file) return; let reader = new FileReader(); reader.onload = ev => { try { let wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' }); let ws = wb.Sheets[wb.SheetNames[0]]; let rows = XLSX.utils.sheet_to_json(ws, { header: 1 }); rows.shift(); let records = [], cur = null, curDate = null; rows.forEach(row => { let date = row[0]; if (date && date !== curDate) { if (cur) records.push(cur); cur = { date, projects: [], count: row[9] || 1, timePassed: row[10] || '', timestamp: new Date().toISOString() }; curDate = date; } if (cur && row[1]) cur.projects.push({ name: row[1], part: row[2]||'胸', weight: row[3]||0, sets: row[4]||0, reps: row[5]||0, feeling: row[6]||'适中', work: row[7]||0, supplement: row[8]||'' }); }); if (cur) records.push(cur); saveRecords(records); renderHistory(); alert(`导入成功，共 ${records.length} 条记录`); } catch(err) { alert('导入失败：'+err.message); } fileInput.value = ''; }; reader.readAsArrayBuffer(file); });
        updateCoachDisplay();
        let coachContainer = document.getElementById('coach-image-container');
        coachContainer.addEventListener('click', handleCoachAnalyze);
        coachContainer.addEventListener('contextmenu', showCoachMenu);
        // 移动端长按支持
        coachContainer.addEventListener('touchstart', function(e) { let timer; timer = setTimeout(() => { showCoachMenu(e); }, 500); coachContainer.addEventListener('touchend', () => clearTimeout(timer)); });
        document.getElementById('close-coach-menu').onclick = () => document.getElementById('coach-menu').classList.remove('active');
        document.getElementById('upload-custom-image').onclick = () => document.getElementById('custom-image-input').click();
        document.getElementById('custom-image-input').onchange = e => { let file = e.target.files[0]; if(!file) return; let reader = new FileReader(); reader.onload = ev => { saveCustomAvatar(ev.target.result); saveCoachAvatar(ev.target.result); updateCoachDisplay(); renderPresetGrid(); }; reader.readAsDataURL(file); };
        if (responseDiv) responseDiv.addEventListener('scroll', updateScrollIndicator);
        if (indicator) indicator.addEventListener('click', handleIndicatorClick);
        viewHistory.addEventListener('click', () => { inputPage.classList.remove('active'); historyPage.classList.add('active'); renderHistory(); });
        backInput.addEventListener('click', () => { historyPage.classList.remove('active'); inputPage.classList.add('active'); });
        workoutDate.valueAsDate = new Date();
        updateTimePassedDisplay();
        setInterval(updateTimePassedDisplay, 60000);
        document.querySelectorAll('#projects-container .project-item').forEach(p => addProjectListeners(p));
        let recs = getRecords();
        workoutCount.value = recs.length ? recs[recs.length-1].count+1 : 1;
    })();
</script>
</body>
</html>
