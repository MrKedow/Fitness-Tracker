<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身数据管理系统</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #4a6fa5;
            --secondary: #6b8cbc;
            --accent: #ff7e5f;
            --light: #f8f9fa;
            --dark: #343a40;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --border-radius: 8px;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f5f7fa;
            color: var(--dark);
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 25px;
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        h1, h2 {
            color: var(--primary);
            margin-bottom: 20px;
            text-align: center;
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
            width: 100%;
        }
        h1:after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            border-radius: 3px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 16px;
            transition: border 0.3s ease;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 2px rgba(74, 111, 165, 0.2);
        }
        .project-controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--secondary); }
        .btn-accent { background-color: var(--accent); color: white; }
        .btn-accent:hover { background-color: #ff9a7f; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-success:hover { background-color: #34ce57; }
        .btn-warning { background-color: var(--warning); color: var(--dark); }
        .btn-warning:hover { background-color: #e0a800; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-danger:hover { background-color: #c82333; }
        .btn-outline { background-color: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background-color: var(--primary); color: white; }
        .btn-icon { width: 40px; height: 40px; padding: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .project-item {
            border: 1px solid #eaeaea;
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 20px;
            background-color: var(--light);
            position: relative;
        }
        .project-item-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .sub-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        .time-display {
            font-size: 1.1rem;
            padding: 15px;
            background-color: #e9f7fe;
            border-radius: var(--border-radius);
            text-align: center;
            margin-bottom: 20px;
        }
        .time-value {
            font-weight: bold;
            color: var(--accent);
        }
        .page { display: none; }
        .page.active { display: block; }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .history-table th, .history-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .history-table th {
            background-color: var(--primary);
            color: white;
            font-weight: 600;
        }
        .history-table tr:nth-child(even) { background-color: #f8f9fa; }
        .history-table tr:hover { background-color: #e9ecef; }
        .history-table tr.selected { background-color: #d4edda; }
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        .empty-state i { font-size: 50px; margin-bottom: 15px; color: #dee2e6; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }
        .modal.active { display: flex; }
        .modal-content {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: white;
            padding: 10px 0;
            z-index: 10;
        }
        .modal-title { font-size: 1.5rem; color: var(--primary); }
        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--dark);
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
            position: sticky;
            bottom: 0;
            background: white;
            padding: 10px 0;
            z-index: 10;
        }
        .work-display {
            background-color: #e8f5e8;
            padding: 10px;
            border-radius: var(--border-radius);
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
            color: #2e7d32;
        }
        .optional { color: #6c757d; font-weight: normal; }
        .ai-suggestion-section {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f8ff;
            border-radius: var(--border-radius);
            border-left: 4px solid var(--primary);
        }
        .ai-suggestion-display {
            background-color: #e8f5e8;
            padding: 15px;
            border-radius: var(--border-radius);
            margin-top: 10px;
            min-height: 100px;
            white-space: pre-wrap;
            font-family: inherit;
        }
        .ai-loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .batch-toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        .checkbox-col { width: 40px; text-align: center; }
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .card { padding: 15px; }
            .project-item-header, .sub-items { grid-template-columns: 1fr; }
            .nav-buttons { flex-direction: column; }
            .modal-content { width: 95%; padding: 15px; }
            .modal-actions { flex-direction: column; }
            .history-table th, .history-table td { padding: 8px 10px; font-size: 12px; }
            .checkbox-col { width: 30px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 录入页面 -->
    <div id="input-page" class="page active">
        <h1>🏋️ 健身数据管理系统</h1>
        <!-- 第一次健身时间设置 -->
        <div class="card" style="background-color: #f0f4f8; border-left: 4px solid var(--primary);">
            <h3>⚙️ 设置第一次健身时间</h3>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <div class="form-group" style="flex:1; min-width:180px;">
                    <label for="first-date">日期</label>
                    <input type="date" id="first-date" required>
                </div>
                <div class="form-group" style="flex:1; min-width:180px;">
                    <label for="first-time">时间</label>
                    <input type="time" id="first-time" step="1" required>
                </div>
            </div>
            <button id="save-first-workout" class="btn btn-primary">保存设置</button>
            <small style="display: block; margin-top: 10px; color: #666;">设置后立即更新“已坚持时间”，新记录将基于此时间计算。</small>
        </div>
        <div class="card">
            <div class="form-group">
                <label for="workout-date">📅 日期</label>
                <input type="date" id="workout-date" required>
            </div>
            <div class="form-group">
                <div class="project-controls">
                    <button id="add-project" class="btn btn-primary btn-icon">+</button>
                    <button id="remove-project" class="btn btn-accent btn-icon">-</button>
                </div>
                <div id="projects-container">
                    <!-- 初始项目模板 -->
                    <div class="project-item">
                        <div class="project-item-header">
                            <div class="form-group"><label>项目名称</label><input type="text" class="project-name" placeholder="例如：坐姿推肩"></div>
                            <div class="form-group"><label>锻炼部位</label><select class="project-part"><option>胸</option><option>背</option><option>腿</option><option>肩</option><option>腹</option></select></div>
                        </div>
                        <div class="sub-items">
                            <div class="form-group"><label>重量 (kg)</label><input type="number" class="weight" min="0" step="0.5" placeholder="例如：20"></div>
                            <div class="form-group"><label>组数</label><input type="number" class="sets" min="1" placeholder="例如：3"></div>
                            <div class="form-group"><label>每组数量</label><input type="number" class="reps" min="1" placeholder="例如：12"></div>
                            <div class="form-group"><label>感受</label><select class="feeling"><option>轻松</option><option selected>适中</option><option>吃力</option><option>非常吃力</option></select></div>
                            <div class="form-group"><label>做功 (J) <span class="optional">自动计算</span></label><input type="number" class="work" readonly><div class="work-display">做功: <span class="work-value">0</span> J</div></div>
                            <div class="form-group"><label>补剂 <span class="optional">选填</span></label><input type="text" class="supplement" placeholder="例如：蛋白粉"></div>
                        </div>
                        <div class="ai-suggestion-section">
                            <h3>🤖 AI建议</h3>
                            <button class="btn btn-primary get-ai-suggestion">查看建议</button>
                            <div class="ai-suggestion-display"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label for="workout-count">#️⃣ 第几次健身</label>
                <input type="number" id="workout-count" min="1" required>
            </div>
            <div class="form-group">
                <h2>⏰ 距离第一次决定健身已过时间</h2>
                <div class="time-display">已坚持: <span id="time-passed" class="time-value">计算中...</span></div>
            </div>
            <div class="nav-buttons">
                <button id="save-btn" class="btn btn-success">💾 保存记录</button>
                <button id="view-history" class="btn btn-outline">📜 来时的路</button>
            </div>
        </div>
    </div>

    <!-- 历史记录页面 -->
    <div id="history-page" class="page">
        <h1>📜 来时的路</h1>
        <div class="card">
            <div id="history-content">
                <div class="empty-state" id="empty-history"><i>📊</i><h3>暂无健身记录</h3><p>开始记录你的第一次健身数据吧！</p></div>
                <div id="batch-toolbar" class="batch-toolbar" style="display: none;">
                    <span id="selected-count" style="margin-right: auto;">已选择 0 条</span>
                    <button id="batch-delete" class="btn btn-danger">批量删除</button>
                    <button id="batch-edit-supplement" class="btn btn-primary">批量修改补剂</button>
                    <button id="cancel-batch" class="btn btn-outline">取消选择</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="history-table" id="history-table" style="display: none;">
                        <thead><tr><th class="checkbox-col"><input type="checkbox" id="select-all-checkbox" style="width: auto;"></th><th>日期</th><th>项目</th><th>第几次</th><th>距离第一次时间</th><th>操作</th></tr></thead>
                        <tbody id="history-body"></tbody>
                    </table>
                </div>
            </div>
            <div class="nav-buttons">
                <button id="export-btn" class="btn btn-success">📎 导出Excel</button>
                <button id="import-btn" class="btn btn-outline">📂 读入Excel</button>
                <button id="back-to-input" class="btn btn-outline">✏️ 返回记录</button>
            </div>
        </div>
    </div>
</div>

<!-- 编辑记录模态框 -->
<div id="edit-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3 class="modal-title">✏️ 编辑记录</h3><button class="close-modal">&times;</button></div>
        <form id="edit-form">
            <div class="form-group"><label for="edit-date">日期</label><input type="date" id="edit-date" required></div>
            <div id="edit-projects-container"></div>
            <div class="form-group"><label for="edit-count">第几次健身</label><input type="number" id="edit-count" min="1" required></div>
            <div class="modal-actions"><button type="button" id="delete-record" class="btn btn-danger">删除记录</button><button type="submit" class="btn btn-success">保存更改</button></div>
        </form>
    </div>
</div>

<!-- 批量修改补剂模态框 -->
<div id="batch-supplement-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3 class="modal-title">批量修改补剂</h3><button class="close-modal" id="close-batch-supplement">&times;</button></div>
        <div class="form-group"><label for="batch-supplement-value">补剂内容</label><input type="text" id="batch-supplement-value" placeholder="例如：蛋白粉、肌酸"></div>
        <div class="modal-actions"><button id="confirm-batch-supplement" class="btn btn-success">确认修改</button><button id="cancel-batch-supplement" class="btn btn-outline">取消</button></div>
    </div>
</div>

<input type="file" id="file-input" accept=".xlsx,.xls" style="display: none;">

<script>
    // ---------- 常量与配置 ----------
    const DEFAULT_FIRST_WORKOUT = '2025-06-09T18:29:00';
    const WORKOUT_DISTANCES = { '胸':0.6, '背':0.6, '腿':0.7, '肩':0.6 };
    const ABDOMINAL_WORK_PER_REP = 65 * 9.8 * 0.3; // 腹部每个仰卧起坐做功(J)
    // DeepSeek API Key (用户需替换为自己的有效key)
    const DEEPSEEK_API_KEY = 'sk-70a54cdae37a4e068651d88eab6a3fc6';  // 请替换为您的真实API Key

    // ---------- 辅助函数 ----------
    function getUserFirstWorkoutDate() {
        const saved = localStorage.getItem('firstWorkoutDateTime');
        return saved ? new Date(saved) : new Date(DEFAULT_FIRST_WORKOUT);
    }
    function setUserFirstWorkoutDate(dateTimeStr) {
        localStorage.setItem('firstWorkoutDateTime', dateTimeStr);
    }
    // 计算两个日期的差值字符串
    function getTimePassedSinceFirst(date) {
        const first = getUserFirstWorkoutDate();
        const diffMs = new Date(date) - first;
        if (diffMs < 0) return '尚未开始';
        const days = Math.floor(diffMs / 86400000);
        const hours = Math.floor((diffMs % 86400000) / 3600000);
        const mins = Math.floor((diffMs % 3600000) / 60000);
        return `${days}天 ${hours}小时 ${mins}分钟`;
    }
    // 更新页面上的实时“已坚持”显示
    function updateTimePassedDisplay() {
        const now = new Date();
        const first = getUserFirstWorkoutDate();
        const diffMs = now - first;
        const days = Math.floor(diffMs / 86400000);
        const hours = Math.floor((diffMs % 86400000) / 3600000);
        const mins = Math.floor((diffMs % 3600000) / 60000);
        const span = document.getElementById('time-passed');
        if (span) span.textContent = `${days}天 ${hours}小时 ${mins}分钟`;
    }

    // 做功计算
    function calculateWork(part, weight, sets, reps) {
        if (part === '腹') return Math.round(sets * reps * ABDOMINAL_WORK_PER_REP);
        const distance = WORKOUT_DISTANCES[part] || 0.6;
        return Math.round(weight * 9.8 * distance * sets * reps);
    }
    function updateWorkDisplay(projectDiv) {
        const part = projectDiv.querySelector('.project-part').value;
        const weight = parseFloat(projectDiv.querySelector('.weight').value) || 0;
        const sets = parseInt(projectDiv.querySelector('.sets').value) || 0;
        const reps = parseInt(projectDiv.querySelector('.reps').value) || 0;
        const workInput = projectDiv.querySelector('.work');
        const workSpan = projectDiv.querySelector('.work-value');
        if (part && sets>0 && reps>0) {
            const work = calculateWork(part, weight, sets, reps);
            workInput.value = work;
            workSpan.textContent = work;
        } else {
            workInput.value = '';
            workSpan.textContent = '0';
        }
    }
    function addProjectListeners(projectDiv) {
        const inputs = projectDiv.querySelectorAll('.project-part, .weight, .sets, .reps');
        inputs.forEach(inp => inp.addEventListener('input', () => updateWorkDisplay(projectDiv)));
        const aiBtn = projectDiv.querySelector('.get-ai-suggestion');
        if (aiBtn) aiBtn.addEventListener('click', () => getAISuggestion(projectDiv));
        updateWorkDisplay(projectDiv);
    }

    // AI建议调用
    async function getAISuggestion(projectDiv) {
        const name = projectDiv.querySelector('.project-name').value.trim();
        const part = projectDiv.querySelector('.project-part').value;
        const weight = projectDiv.querySelector('.weight').value;
        const sets = projectDiv.querySelector('.sets').value;
        const reps = projectDiv.querySelector('.reps').value;
        const feeling = projectDiv.querySelector('.feeling').value;
        const work = projectDiv.querySelector('.work-value').textContent;
        const supplement = projectDiv.querySelector('.supplement').value || '无';
        if (!name || !part || !sets || !reps) {
            alert('请先填写项目名称、锻炼部位、组数和每组数量');
            return;
        }
        const displayDiv = projectDiv.querySelector('.ai-suggestion-display');
        const btn = projectDiv.querySelector('.get-ai-suggestion');
        btn.innerHTML = '<span class="ai-loading"></span>请求中...';
        btn.disabled = true;
        displayDiv.textContent = '正在获取AI建议...';
        try {
            const prompt = `训练项目：${name}\n锻炼部位：${part}\n重量：${weight}kg\n组数：${sets}\n每组次数：${reps}\n感受：${feeling}\n做功：${work}J\n补剂：${supplement}\n请根据该训练情况提供当日饮食和近两天休整计划，简洁实用。`;
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` },
                body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'user', content: prompt }], max_tokens: 800, temperature: 0.7 })
            });
            if (!response.ok) throw new Error(`API错误 ${response.status}`);
            const data = await response.json();
            displayDiv.textContent = data.choices[0].message.content;
        } catch (err) {
            console.error(err);
            displayDiv.textContent = `获取失败: ${err.message}。请检查API Key或网络。`;
        } finally {
            btn.innerHTML = '查看建议';
            btn.disabled = false;
        }
    }

    // ---------- 数据存储 ----------
    function getRecords() { return JSON.parse(localStorage.getItem('fitnessRecords') || '[]'); }
    function saveRecords(records) { localStorage.setItem('fitnessRecords', JSON.stringify(records)); }

    // ---------- UI 元素 ----------
    const inputPage = document.getElementById('input-page');
    const historyPage = document.getElementById('history-page');
    const projectsContainer = document.getElementById('projects-container');
    const addProjectBtn = document.getElementById('add-project');
    const removeProjectBtn = document.getElementById('remove-project');
    const saveBtn = document.getElementById('save-btn');
    const viewHistoryBtn = document.getElementById('view-history');
    const backToInputBtn = document.getElementById('back-to-input');
    const exportBtn = document.getElementById('export-btn');
    const importBtn = document.getElementById('import-btn');
    const workoutDateInput = document.getElementById('workout-date');
    const workoutCountInput = document.getElementById('workout-count');
    const historyBody = document.getElementById('history-body');
    const historyTable = document.getElementById('history-table');
    const emptyHistory = document.getElementById('empty-history');
    const editModal = document.getElementById('edit-modal');
    const editForm = document.getElementById('edit-form');
    const editDateInput = document.getElementById('edit-date');
    const editCountInput = document.getElementById('edit-count');
    const editProjectsContainer = document.getElementById('edit-projects-container');
    const deleteRecordBtn = document.getElementById('delete-record');
    const fileInput = document.getElementById('file-input');
    const saveFirstWorkoutBtn = document.getElementById('save-first-workout');
    const firstDateInput = document.getElementById('first-date');
    const firstTimeInput = document.getElementById('first-time');
    const batchToolbar = document.getElementById('batch-toolbar');
    const selectAllCheckbox = document.getElementById('select-all-checkbox');
    const batchDeleteBtn = document.getElementById('batch-delete');
    const batchEditSupplementBtn = document.getElementById('batch-edit-supplement');
    const cancelBatchBtn = document.getElementById('cancel-batch');
    const selectedCountSpan = document.getElementById('selected-count');
    const batchSupplementModal = document.getElementById('batch-supplement-modal');
    const batchSupplementValue = document.getElementById('batch-supplement-value');
    const confirmBatchSupplement = document.getElementById('confirm-batch-supplement');
    const cancelBatchSupplement = document.getElementById('cancel-batch-supplement');
    const closeBatchSupplement = document.getElementById('close-batch-supplement');

    let currentEditIndex = -1;
    let selectedIndices = new Set(); // 批量选中索引

    // ---------- 第一次健身时间设置 ----------
    function initFirstWorkoutUI() {
        const first = getUserFirstWorkoutDate();
        const y = first.getFullYear();
        const m = String(first.getMonth()+1).padStart(2,'0');
        const d = String(first.getDate()).padStart(2,'0');
        const h = String(first.getHours()).padStart(2,'0');
        const min = String(first.getMinutes()).padStart(2,'0');
        const s = String(first.getSeconds()).padStart(2,'0');
        firstDateInput.value = `${y}-${m}-${d}`;
        firstTimeInput.value = `${h}:${min}:${s}`;
    }
    saveFirstWorkoutBtn.addEventListener('click', () => {
        const date = firstDateInput.value;
        const time = firstTimeInput.value;
        if (!date || !time) { alert('请完整填写日期和时间'); return; }
        const dtStr = `${date}T${time}`;
        if (isNaN(new Date(dtStr).getTime())) { alert('无效日期时间'); return; }
        setUserFirstWorkoutDate(dtStr);
        updateTimePassedDisplay();
        alert('第一次健身时间已更新！');
    });

    // ---------- 项目管理 ----------
    function createEmptyProjectItem() {
        const div = document.createElement('div');
        div.className = 'project-item';
        div.innerHTML = `
            <div class="project-item-header">
                <div class="form-group"><label>项目名称</label><input type="text" class="project-name" placeholder="例如：坐姿推肩"></div>
                <div class="form-group"><label>锻炼部位</label><select class="project-part"><option>胸</option><option>背</option><option>腿</option><option>肩</option><option>腹</option></select></div>
            </div>
            <div class="sub-items">
                <div class="form-group"><label>重量 (kg)</label><input type="number" class="weight" min="0" step="0.5" placeholder="例如：20"></div>
                <div class="form-group"><label>组数</label><input type="number" class="sets" min="1" placeholder="例如：3"></div>
                <div class="form-group"><label>每组数量</label><input type="number" class="reps" min="1" placeholder="例如：12"></div>
                <div class="form-group"><label>感受</label><select class="feeling"><option>轻松</option><option selected>适中</option><option>吃力</option><option>非常吃力</option></select></div>
                <div class="form-group"><label>做功 (J) <span class="optional">自动计算</span></label><input type="number" class="work" readonly><div class="work-display">做功: <span class="work-value">0</span> J</div></div>
                <div class="form-group"><label>补剂 <span class="optional">选填</span></label><input type="text" class="supplement" placeholder="例如：蛋白粉"></div>
            </div>
            <div class="ai-suggestion-section"><h3>🤖 AI建议</h3><button class="btn btn-primary get-ai-suggestion">查看建议</button><div class="ai-suggestion-display"></div></div>
        `;
        addProjectListeners(div);
        return div;
    }
    addProjectBtn.addEventListener('click', () => {
        projectsContainer.appendChild(createEmptyProjectItem());
    });
    removeProjectBtn.addEventListener('click', () => {
        const items = projectsContainer.querySelectorAll('.project-item');
        if (items.length > 1) items[items.length-1].remove();
        else alert('至少保留一个项目');
    });

    // ---------- 保存记录 ----------
    saveBtn.addEventListener('click', () => {
        const date = workoutDateInput.value;
        const count = parseInt(workoutCountInput.value);
        if (!date || !count) { alert('请填写日期和第几次健身'); return; }
        const projects = [];
        const projectDivs = projectsContainer.querySelectorAll('.project-item');
        for (let div of projectDivs) {
            const name = div.querySelector('.project-name').value.trim();
            const part = div.querySelector('.project-part').value;
            const weight = parseFloat(div.querySelector('.weight').value) || 0;
            const sets = parseInt(div.querySelector('.sets').value) || 0;
            const reps = parseInt(div.querySelector('.reps').value) || 0;
            const feeling = div.querySelector('.feeling').value;
            const work = parseInt(div.querySelector('.work').value) || 0;
            const supplement = div.querySelector('.supplement').value || '';
            if (name && part && sets && reps) projects.push({ name, part, weight, sets, reps, feeling, work, supplement });
        }
        if (projects.length === 0) { alert('请至少填写一个完整项目'); return; }
        const timePassed = getTimePassedSinceFirst(date);
        const records = getRecords();
        records.push({ date, projects, count, timePassed, timestamp: new Date().toISOString() });
        saveRecords(records);
        // 重置表单：清空所有项目，保留一个空项目，并增加下一次训练次数
        workoutCountInput.value = count + 1;
        projectsContainer.innerHTML = '';
        projectsContainer.appendChild(createEmptyProjectItem());
        alert('记录保存成功！');
    });

    // ---------- 历史记录显示（含批量复选框）----------
    function renderHistory() {
        const records = getRecords();
        if (records.length === 0) {
            emptyHistory.style.display = 'block';
            historyTable.style.display = 'none';
            batchToolbar.style.display = 'none';
            return;
        }
        emptyHistory.style.display = 'none';
        historyTable.style.display = 'table';
        historyBody.innerHTML = '';
        records.sort((a,b) => new Date(b.date) - new Date(a.date));
        records.forEach((rec, idx) => {
            const row = historyBody.insertRow();
            // 复选框列
            const chkCell = row.insertCell(0);
            const chk = document.createElement('input');
            chk.type = 'checkbox';
            chk.className = 'record-checkbox';
            chk.dataset.index = idx;
            chk.checked = selectedIndices.has(idx);
            chk.addEventListener('change', (e) => {
                if (e.target.checked) selectedIndices.add(idx);
                else selectedIndices.delete(idx);
                updateBatchUI();
                row.classList.toggle('selected', e.target.checked);
            });
            chkCell.appendChild(chk);
            // 其他列
            const dateCell = row.insertCell(1);
            const projectCell = row.insertCell(2);
            const countCell = row.insertCell(3);
            const timeCell = row.insertCell(4);
            const actionCell = row.insertCell(5);
            dateCell.textContent = rec.date;
            const projHtml = rec.projects.map(p => `${p.name} (${p.part}): ${p.sets}组×${p.reps}次, ${p.weight}kg, ${p.work}J`).join('<br>');
            projectCell.innerHTML = projHtml;
            countCell.textContent = `第${rec.count}次`;
            timeCell.textContent = rec.timePassed;
            const editBtn = document.createElement('button');
            editBtn.textContent = '编辑';
            editBtn.className = 'btn btn-warning edit-record';
            editBtn.dataset.index = idx;
            editBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                openEditModal(parseInt(editBtn.dataset.index));
            });
            actionCell.appendChild(editBtn);
            if (selectedIndices.has(idx)) row.classList.add('selected');
        });
        updateBatchUI();
    }
    function updateBatchUI() {
        const cnt = selectedIndices.size;
        selectedCountSpan.textContent = `已选择 ${cnt} 条`;
        if (cnt > 0) batchToolbar.style.display = 'flex';
        else batchToolbar.style.display = 'none';
        const total = getRecords().length;
        if (selectAllCheckbox) {
            selectAllCheckbox.checked = (cnt === total && total > 0);
            selectAllCheckbox.indeterminate = (cnt > 0 && cnt < total);
        }
    }
    function toggleSelectAll(checked) {
        const total = getRecords().length;
        selectedIndices.clear();
        if (checked) for (let i=0; i<total; i++) selectedIndices.add(i);
        renderHistory();
    }
    // 批量删除
    async function batchDelete() {
        if (selectedIndices.size === 0) { alert('请先选择要删除的记录'); return; }
        if (!confirm(`确定删除 ${selectedIndices.size} 条记录吗？不可恢复`)) return;
        let records = getRecords();
        const newRecords = records.filter((_, idx) => !selectedIndices.has(idx));
        saveRecords(newRecords);
        selectedIndices.clear();
        renderHistory();
        alert('删除成功');
    }
    // 批量修改补剂
    function openBatchSupplement() {
        if (selectedIndices.size === 0) { alert('请先选择记录'); return; }
        batchSupplementValue.value = '';
        batchSupplementModal.classList.add('active');
    }
    function confirmBatchSupplementChange() {
        const newSuppl = batchSupplementValue.value.trim();
        if (!newSuppl) { alert('请输入补剂内容'); return; }
        let records = getRecords();
        let changed = false;
        for (let idx of selectedIndices) {
            if (records[idx]) {
                records[idx].projects.forEach(p => p.supplement = newSuppl);
                changed = true;
            }
        }
        if (changed) {
            saveRecords(records);
            renderHistory();
            alert('补剂已批量更新');
        }
        batchSupplementModal.classList.remove('active');
    }
    function cancelBatchMode() {
        selectedIndices.clear();
        renderHistory();
    }

    // ---------- 编辑记录 ----------
    function openEditModal(index) {
        const records = getRecords();
        const rec = records[index];
        if (!rec) return;
        currentEditIndex = index;
        editDateInput.value = rec.date;
        editCountInput.value = rec.count;
        editProjectsContainer.innerHTML = '';
        rec.projects.forEach(proj => {
            const div = document.createElement('div');
            div.className = 'project-item';
            div.innerHTML = `
                <div class="project-item-header">
                    <div class="form-group"><label>项目名称</label><input type="text" class="project-name" value="${escapeHtml(proj.name)}"></div>
                    <div class="form-group"><label>锻炼部位</label><select class="project-part">${['胸','背','腿','肩','腹'].map(p => `<option ${p===proj.part ? 'selected' : ''}>${p}</option>`).join('')}</select></div>
                </div>
                <div class="sub-items">
                    <div class="form-group"><label>重量 (kg)</label><input type="number" class="weight" value="${proj.weight}"></div>
                    <div class="form-group"><label>组数</label><input type="number" class="sets" value="${proj.sets}"></div>
                    <div class="form-group"><label>每组数量</label><input type="number" class="reps" value="${proj.reps}"></div>
                    <div class="form-group"><label>感受</label><select class="feeling">${['轻松','适中','吃力','非常吃力'].map(f => `<option ${f===proj.feeling ? 'selected' : ''}>${f}</option>`).join('')}</select></div>
                    <div class="form-group"><label>做功 (J)</label><input type="number" class="work" value="${proj.work}" readonly><div class="work-display">做功: <span class="work-value">${proj.work}</span> J</div></div>
                    <div class="form-group"><label>补剂</label><input type="text" class="supplement" value="${escapeHtml(proj.supplement||'')}"></div>
                </div>
            `;
            editProjectsContainer.appendChild(div);
            addProjectListeners(div);
        });
        editModal.classList.add('active');
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;}); }
    editForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const records = getRecords();
        const rec = records[currentEditIndex];
        if (!rec) return;
        rec.date = editDateInput.value;
        rec.count = parseInt(editCountInput.value);
        const newProjects = [];
        const items = editProjectsContainer.querySelectorAll('.project-item');
        items.forEach(item => {
            const name = item.querySelector('.project-name').value.trim();
            const part = item.querySelector('.project-part').value;
            const weight = parseFloat(item.querySelector('.weight').value) || 0;
            const sets = parseInt(item.querySelector('.sets').value) || 0;
            const reps = parseInt(item.querySelector('.reps').value) || 0;
            const feeling = item.querySelector('.feeling').value;
            const work = parseInt(item.querySelector('.work').value) || 0;
            const supplement = item.querySelector('.supplement').value || '';
            if (name && part && sets && reps) newProjects.push({ name, part, weight, sets, reps, feeling, work, supplement });
        });
        rec.projects = newProjects;
        rec.timePassed = getTimePassedSinceFirst(rec.date);
        saveRecords(records);
        editModal.classList.remove('active');
        renderHistory();
        alert('记录已更新');
    });
    deleteRecordBtn.addEventListener('click', () => {
        if (confirm('永久删除此记录？')) {
            let records = getRecords();
            records.splice(currentEditIndex, 1);
            saveRecords(records);
            editModal.classList.remove('active');
            renderHistory();
            alert('已删除');
        }
    });
    // 关闭模态框
    document.querySelectorAll('.close-modal').forEach(btn => btn.addEventListener('click', () => editModal.classList.remove('active')));
    editModal.addEventListener('click', (e) => { if (e.target === editModal) editModal.classList.remove('active'); });
    // 批量修改模态框关闭
    const closeBatch = () => batchSupplementModal.classList.remove('active');
    if (closeBatchSupplement) closeBatchSupplement.addEventListener('click', closeBatch);
    if (cancelBatchSupplement) cancelBatchSupplement.addEventListener('click', closeBatch);
    batchSupplementModal.addEventListener('click', (e) => { if (e.target === batchSupplementModal) closeBatch(); });
    if (confirmBatchSupplement) confirmBatchSupplement.addEventListener('click', confirmBatchSupplementChange);

    // ---------- 导出/导入 ----------
    exportBtn.addEventListener('click', () => {
        const records = getRecords();
        if (records.length === 0) { alert('无数据可导出'); return; }
        const data = [['日期','项目名称','锻炼部位','重量(kg)','组数','每组数量','感受','做功(J)','补剂','第几次健身','距离第一次健身时间']];
        records.forEach(r => {
            r.projects.forEach(p => {
                data.push([r.date, p.name, p.part, p.weight, p.sets, p.reps, p.feeling, p.work, p.supplement||'', r.count, r.timePassed]);
            });
        });
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(data);
        XLSX.utils.book_append_sheet(wb, ws, '健身记录');
        XLSX.writeFile(wb, `健身记录_${new Date().toISOString().slice(0,19)}.xlsx`);
    });
    importBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                rows.shift(); // 去掉表头
                const records = [];
                let curRecord = null, curDate = null;
                for (let row of rows) {
                    const date = row[0];
                    if (date && date !== curDate) {
                        if (curRecord) records.push(curRecord);
                        curRecord = { date, projects: [], count: row[9] || 1, timePassed: row[10] || '', timestamp: new Date().toISOString() };
                        curDate = date;
                    }
                    if (curRecord && row[1]) {
                        curRecord.projects.push({
                            name: row[1], part: row[2] || '胸', weight: row[3] || 0, sets: row[4] || 0, reps: row[5] || 0,
                            feeling: row[6] || '适中', work: row[7] || 0, supplement: row[8] || ''
                        });
                    }
                }
                if (curRecord) records.push(curRecord);
                saveRecords(records);
                renderHistory();
                alert(`导入成功，共 ${records.length} 条记录`);
            } catch (err) { alert('导入失败：'+err.message); }
            fileInput.value = '';
        };
        reader.readAsArrayBuffer(file);
    });

    // ---------- 页面导航 ----------
    viewHistoryBtn.addEventListener('click', () => {
        inputPage.classList.remove('active');
        historyPage.classList.add('active');
        renderHistory();
    });
    backToInputBtn.addEventListener('click', () => {
        historyPage.classList.remove('active');
        inputPage.classList.add('active');
    });

    // 批量事件绑定
    if (selectAllCheckbox) selectAllCheckbox.addEventListener('change', (e) => toggleSelectAll(e.target.checked));
    if (batchDeleteBtn) batchDeleteBtn.addEventListener('click', batchDelete);
    if (batchEditSupplementBtn) batchEditSupplementBtn.addEventListener('click', openBatchSupplement);
    if (cancelBatchBtn) cancelBatchBtn.addEventListener('click', cancelBatchMode);

    // ---------- 初始化 ----------
    function init() {
        workoutDateInput.valueAsDate = new Date();
        initFirstWorkoutUI();
        updateTimePassedDisplay();
        setInterval(updateTimePassedDisplay, 60000);
        // 初始化项目监听器
        const initialProjects = projectsContainer.querySelectorAll('.project-item');
        initialProjects.forEach(p => addProjectListeners(p));
        // 设置下一次训练次数
        const records = getRecords();
        workoutCountInput.value = records.length ? records[records.length-1].count + 1 : 1;
    }
    init();
</script>
</body>
</html>
